<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Watch - AI Agent Activity Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --card: #12121a; --card-hover: #1a1a25;
            --text: #e8e8ec; --text-muted: #6b6b7b; --accent: #6366f1;
            --green: #22c55e; --red: #ef4444; --orange: #f97316; --border: rgba(255,255,255,0.08);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), #8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text { font-size: 24px; font-weight: 700; }
        .logo-text span { color: var(--text-muted); font-weight: 400; }
        .token-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .token-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .token-avatar { width: 50px; height: 50px; border-radius: 14px; background: linear-gradient(135deg, var(--accent), #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .token-name { font-weight: 700; font-size: 18px; }
        .token-symbol { font-size: 13px; color: var(--text-muted); }
        .token-links { display: flex; gap: 8px; margin-left: auto; }
        .token-link { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-muted); text-decoration: none; }
        .token-link:hover { background: rgba(255,255,255,0.1); color: var(--text); }
        .token-price-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .token-price { font-size: 32px; font-weight: 700; }
        .token-change { padding: 6px 12px; border-radius: 8px; font-size: 14px; font-weight: 600; }
        .token-change.up { color: var(--green); background: rgba(34,197,94,0.1); }
        .token-change.down { color: var(--red); background: rgba(239,68,68,0.1); }
        .token-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
        .token-stat { text-align: center; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .token-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .token-stat-value { font-size: 14px; font-weight: 600; }
        .token-ca { margin-top: 12px; padding: 8px 12px; background: rgba(255,255,255,0.02); border-radius: 8px; font-family: monospace; font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .live-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(34,197,94,0.15); color: var(--green); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .section-icon { font-size: 20px; }
        .section-title { font-size: 18px; font-weight: 600; }
        .agent-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 12px; }
        .agent-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; text-decoration: none; color: var(--text); transition: all 0.2s ease; }
        .agent-item:hover { background: var(--card-hover); border-color: rgba(99,102,241,0.3); }
        .agent-rank { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 700; font-size: 13px; background: rgba(99,102,241,0.1); color: var(--accent); }
        .agent-avatar-sm { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #333, #555); display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .agent-info { flex: 1; }
        .agent-name-sm { font-weight: 600; font-size: 14px; }
        .agent-handle-sm { font-size: 12px; color: var(--text-muted); }
        .agent-badges { display: flex; gap: 6px; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--text-muted); }
        .badge.verified { background: rgba(34,197,94,0.1); color: var(--green); }
        .scroll-hint { text-align: center; color: var(--text-muted); font-size: 12px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <div class="logo-text">Agent<span>Watch</span></div>
            </div>
            <div class="live-badge"><span class="live-dot"></span>Live • DexScreener</div>
        </header>

        <div class="section-header">
            <span class="section-icon">💎</span>
            <h2 class="section-title">My Connected Agent Tokens</h2>
        </div>
        <div id="tokenContainer"></div>

        <div class="section-header" style="margin-top: 32px;">
            <span class="section-icon">🧠</span>
            <h2 class="section-title">Top AI Agents</h2>
        </div>
        <div class="agent-list" id="topAgents"></div>
        <div class="scroll-hint">Data from <a href="https://bankr.bot/agents" target="_blank" style="color: var(--accent);">bankr.bot/agents</a></div>
    </div>
    <script>
        const TOKENS = [
            { id: 'kellyclaude', name: 'KellyClaude', symbol: 'KELLY', avatar: '👑', chain: 'base', address: '0x50d2280441372486beecdd328c1854743ebacb07', xHandle: 'Austen', xUrl: 'https://x.com/Austen' },
            { id: 'clawd', name: 'CLAWD', symbol: 'CLAWD', avatar: '🦾', chain: 'base', address: '0x9f86db9fc6f7c9408e8fda3ff8ce4e78ac7a6b07', xHandle: 'clawdbotatg', xUrl: 'https://x.com/clawdbotatg' }
        ];

        const TOP_AGENTS = [
            { rank: 1, name: 'aixbt', handle: '@aixbt_agent', avatar: '🔮', xUrl: 'https://x.com/aixbt_agent', badges: ['Alpha', 'Active'] },
            { rank: 2, name: 'Bankr', handle: '@bankr_agent', avatar: '🏦', xUrl: 'https://x.com/bankr_agent', badges: ['Protocol', 'Verified'] },
            { rank: 3, name: 'Zerebro', handle: '@zerebro_org', avatar: '🎭', xUrl: 'https://x.com/zerebro_org', badges: ['NFT', 'Music'] },
            { rank: 4, name: 'Clanker', handle: '@clanker', avatar: '🔧', xUrl: 'https://x.com/clanker', badges: ['Launchpad'] },
            { rank: 5, name: 'Luna', handle: '@luna_virtuals', avatar: '🌙', xUrl: 'https://x.com/luna_virtuals', badges: ['Content'] },
            { rank: 6, name: 'Moby', handle: '@mobyagent', avatar: '🐋', xUrl: 'https://x.com/mobyagent', badges: ['Whale Watcher'] },
            { rank: 7, name: 'Simmi', handle: '@simsimverse', avatar: '👤', xUrl: 'https://x.com/simsimverse', badges: ['Social'] },
            { rank: 8, name: 'Vader', handle: '@vader_ai_', avatar: '⚔️', xUrl: 'https://x.com/vader_ai_', badges: ['Trading'] },
            { rank: 9, name: 'Arkis', handle: '@arkisxyz', avatar: '📊', xUrl: 'https://x.com/arkisxyz', badges: ['Analytics'] },
            { rank: 10, name: 'Neuro', handle: '@neuro_ft', avatar: '🧠', xUrl: 'https://x.com/neuro_ft', badges: ['Sentiment'] }
        ];

        function formatNumber(num) { if (!num) return '—'; if (num >= 1e9) return '$' + (num/1e9).toFixed(2) + 'B'; if (num >= 1e6) return '$' + (num/1e6).toFixed(2) + 'M'; if (num >= 1e3) return '$' + (num/1e3).toFixed(2) + 'K'; return '$' + num.toFixed(2); }
        function formatPrice(price) { if (!price) return '—'; if (price < 0.000001) return '$' + price.toFixed(10); if (price < 0.01) return '$' + price.toFixed(6); if (price < 1) return '$' + price.toFixed(4); return '$' + price.toFixed(2); }
        function createTokenCard(token, data) {
            const price = data?.priceUsd || null;
            const change24h = data?.priceChange?.h24 || null;
            const marketCap = data?.marketCap || null;
            const volume24h = data?.volume?.h24 || null;
            const liquidity = data?.liquidity?.usd || null;
            const isUp = change24h !== null ? change24h >= 0 : null;
            const dexUrl = `https://dexscreener.com/${token.chain}/${token.address}`;
            return `
                <div class="token-card">
                    <div class="token-header">
                        <div class="token-avatar">${token.avatar}</div>
                        <div>
                            <div class="token-name">${token.name}</div>
                            <div class="token-symbol">$${token.symbol} • @${token.xHandle}</div>
                        </div>
                        <div class="token-links">
                            <a href="${token.xUrl}" target="_blank" class="token-link" title="X Profile">𝕏</a>
                            <a href="${dexUrl}" target="_blank" class="token-link" title="DexScreener">📊</a>
                        </div>
                    </div>
                    <div class="token-price-row">
                        <div class="token-price">${price ? formatPrice(price) : 'Loading...'}</div>
                        <div class="token-change ${isUp === null ? '' : (isUp ? 'up' : 'down')}">${change24h !== null ? (isUp ? '▲' : '▼') + ' ' + Math.abs(change24h).toFixed(2) + '%' : '—'}</div>
                    </div>
                    <div class="token-stats">
                        <div class="token-stat"><div class="token-stat-label">Market Cap</div><div class="token-stat-value">${formatNumber(marketCap)}</div></div>
                        <div class="token-stat"><div class="token-stat-label">Volume 24h</div><div class="token-stat-value">${formatNumber(volume24h)}</div></div>
                        <div class="token-stat"><div class="token-stat-label">Liquidity</div><div class="token-stat-value">${formatNumber(liquidity)}</div></div>
                    </div>
                    <div class="token-ca">${token.address}</div>
                </div>
            `;
        }

        function createAgentItem(agent) {
            const badgesHtml = agent.badges.map(b => `<span class="badge ${b === 'Verified' ? 'verified' : ''}">${b}</span>`).join('');
            return `
                <a href="${agent.xUrl}" target="_blank" class="agent-item">
                    <div class="agent-rank">${agent.rank}</div>
                    <div class="agent-avatar-sm">${agent.avatar}</div>
                    <div class="agent-info">
                        <div class="agent-name-sm">${agent.name}</div>
                        <div class="agent-handle-sm">${agent.handle}</div>
                    </div>
                    <div class="agent-badges">${badgesHtml}</div>
                </a>
            `;
        }

        async function fetchTokenData(token) {
            try {
                const response = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${token.address}`);
                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                if (data.pairs && data.pairs.length > 0) {
                    const bestPair = data.pairs.sort((a,b) => (b.liquidity?.usd||0) - (a.liquidity?.usd||0))[0];
                    return { priceUsd: parseFloat(bestPair.priceUsd), priceChange: bestPair.priceChange, marketCap: bestPair.marketCap, volume: bestPair.volume, liquidity: bestPair.liquidity };
                }
                return null;
            } catch (e) { console.error(e); return null; }
        }

        async function updateTokens() {
            const container = document.getElementById('tokenContainer');
            let html = '';
            for (const token of TOKENS) {
                const data = await fetchTokenData(token);
                html += createTokenCard(token, data);
            }
            container.innerHTML = html;
        }

        function renderTopAgents() {
            const container = document.getElementById('topAgents');
            container.innerHTML = TOP_AGENTS.map(createAgentItem).join('');
        }

        updateTokens();
        renderTopAgents();
        setInterval(updateTokens, 30000);
    </script>
</body>
</html>
